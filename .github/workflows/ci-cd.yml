name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CHECKOUT
      # =========================
      - name: Checkout código
        uses: actions/checkout@v3

      # =========================
      # 2. JAVA SETUP
      # =========================
      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # =========================
      # 3. VALIDAR DOCKER COMPOSE
      # =========================
      - name: Validar docker-compose
        run: docker compose config

      # =========================
      # 4. SUBIR AMBIENTE LOCAL (CI)
      # =========================
      - name: Subir containers (Oracle + API)
        run: docker compose up -d --build

      - name: Aguardar Oracle subir
        run: sleep 30

      # =========================
      # 5. TESTES INTEGRADOS
      # =========================
      - name: Rodar testes Maven
        run: mvn test

      # =========================
      # 6. LIMPAR AMBIENTE
      # =========================
      - name: Derrubar containers
        run: docker compose down

      # =========================
      # 7. DEPLOY STAGING (DEVELOP)
      # =========================
      - name: Deploy STAGING (VPS)
        if: github.ref == 'refs/heads/develop'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /app/energia
            git pull origin develop
            docker compose up -d --build

      # =========================
      # 8. DEPLOY PRODUÇÃO (MAIN)
      # =========================
      - name: Deploy PRODUÇÃO (VPS)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /app/energia
            git pull origin main
            docker compose up -d --build
