name: CI/CD Pipeline Simplificado

on:
  push:
    branches:
      - main
      - develop
      
permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  IMAGE_NAME: energia-api
  OWNER: rafa2k137  

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Compilar e empacotar
        run: mvn -B clean package -DskipTests

      - name: Rodar testes
        run: mvn -B test

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: rafa2k137
          password: ${{ secrets.GHCR_PAT }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:latest


      - name: Deploy Staging (branch develop)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:latest
            docker stop energia-api || true
            docker rm energia-api || true
            docker run -d --name energia-api \
              -p 8080:8080 \
              -e DB_URL="${{ secrets.STAGING_DB_URL }}" \
              -e DB_USERNAME="${{ secrets.STAGING_DB_USER }}" \
              -e DB_PASSWORD="${{ secrets.STAGING_DB_PASSWORD }}" \
              ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:latest


      - name: Deploy Produção (branch main)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:latest
            docker stop energia-api || true
            docker rm energia-api || true
            docker run -d --name energia-api \
              --restart always \
              -p 8080:8080 \
              -e DB_URL="${{ secrets.PROD_DB_URL }}" \
              -e DB_USERNAME="${{ secrets.PROD_DB_USER }}" \
              -e DB_PASSWORD="${{ secrets.PROD_DB_PASSWORD }}" \
              ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:latest
