name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Validar docker-compose
        run: docker compose config

      - name: Subir container para testes
        run: docker compose up -d --build

      - name: Rodar testes Maven
        run: mvn test

      - name: Derrubar containers
        run: docker compose down

      # Deploy STAGING
      - name: Deploy para staging
        run: |
          echo "Deploy em staging..."
          # Exemplo: docker push ou ssh para servidor

      # Deploy PRODUÇÃO
      - name: Deploy para produção
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploy em produção..."
          # Exemplo: docker push + pull no servidor
