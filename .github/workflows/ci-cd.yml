name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CHECKOUT
      # =========================
      - name: Checkout código
        uses: actions/checkout@v3

      # =========================
      # 2. JAVA SETUP
      # =========================
      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # =========================
      # 3. VALIDAR DOCKER COMPOSE
      # =========================
      - name: Validar docker-compose
        run: docker compose config

      # =========================
      # 4. SUBIR AMBIENTE (API + ORACLE)
      # =========================
      - name: Subir containers
        run: docker compose up -d --build

      - name: Aguardar banco subir
        run: sleep 30

      # =========================
      # 5. TESTES INTEGRADOS
      # =========================
      - name: Rodar testes Maven
        run: mvn test

      # =========================
      # 6. DERRUBAR AMBIENTE
      # =========================
      - name: Derrubar containers
        run: docker compose down

      # =========================
      # 7. LOGIN NO DOCKER HUB
      # =========================
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # =========================
      # 8. BUILD DA IMAGEM
      # =========================
      - name: Build imagem Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/energia-api:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/energia-api:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/energia-api:latest

      # =========================
      # 9. PUSH IMAGEM
      # =========================
      - name: Push imagem Docker
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/energia-api:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/energia-api:latest

      # =========================
      # 10. DEPLOY STAGING (develop)
      # =========================
      - name: Deploy STAGING
        if: github.ref == 'refs/heads/develop'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/energia-api:latest
            docker stop energia-api || true
            docker rm energia-api || true
            docker run -d \
              -p 8080:8080 \
              --name energia-api \
              -e DB_URL=${{ secrets.DB_URL_STAGING }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              ${{ secrets.DOCKER_USERNAME }}/energia-api:latest

      # =========================
      # 11. DEPLOY PRODUÇÃO (main)
      # =========================
      - name: Deploy PRODUÇÃO
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/energia-api:latest
            docker stop energia-api || true
            docker rm energia-api || true
            docker run -d \
              -p 8080:8080 \
              --name energia-api \
              -e DB_URL=${{ secrets.DB_URL_PROD }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              ${{ secrets.DOCKER_USERNAME }}/energia-api:latest
