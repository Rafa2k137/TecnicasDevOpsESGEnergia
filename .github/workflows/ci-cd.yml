name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # JOB 1 — CI: Build e Testes
  # ============================================
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Validar docker-compose
        run: docker compose config

      - name: Subir containers (banco Oracle para testes)
        run: docker compose up -d oracle-db

      - name: Aguardar banco subir
        run: |
          echo "Aguardando Oracle ficar pronto..."
          for i in $(seq 1 60); do
            if docker exec oracle-db bash -c "echo 'SELECT 1 FROM DUAL;' | sqlplus -s RM559461/201104@localhost:1521/FREEPDB1" 2>/dev/null | grep -q "1"; then
              echo "Oracle pronto!"
              break
            fi
            echo "Tentativa $i/60..."
            sleep 5
          done

      - name: Rodar testes Maven
        run: mvn test

      - name: Derrubar containers
        if: always()
        run: docker compose down

  # ============================================
  # JOB 2 — CD: Deploy para Staging
  # ============================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: staging

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadata (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Build e Push da imagem Docker (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Verificar imagem no registry
        run: |
          echo "=========================================="
          echo " DEPLOY STAGING CONCLUÍDO COM SUCESSO"
          echo "=========================================="
          echo ""
          echo "Imagem publicada:"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging"
          echo ""
          echo "Para rodar localmente:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging"
          echo "  docker run -p 8080:8080 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging"
          echo ""
          echo "=========================================="

  # ============================================
  # JOB 3 — CD: Deploy para Produção
  # ============================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadata (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=production
            type=sha,prefix=prod-

      - name: Build e Push da imagem Docker (produção)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Verificar imagem no registry
        run: |
          echo "=========================================="
          echo " DEPLOY PRODUÇÃO CONCLUÍDO COM SUCESSO"
          echo "=========================================="
          echo ""
          echo "Imagens publicadas:"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "Para rodar em produção:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "  docker run -p 8080:8080 \\"
          echo "    -e DB_URL=jdbc:oracle:thin:@seu-oracle:1521/FREEPDB1 \\"
          echo "    -e DB_USERNAME=usuario \\"
          echo "    -e DB_PASSWORD=senha \\"
          echo "    ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "=========================================="
